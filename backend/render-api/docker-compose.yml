version: "3.8"

services:
  render-api:
    build: .
    container_name: render-jobs-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    volumes:
      - render-jobs-data:/app/data/jobs
      - render-output:/app/data/renders
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

volumes:
  render-jobs-data:
    driver: local
  render-output:
    driver: local
